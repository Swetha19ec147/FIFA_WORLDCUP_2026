services:
  # 1. NestJS Backend API
  - type: web
    name: fifa-api
    env: node
    plan: free
    # rootDir left blank to run from the root of the monorepo
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build -w api
    startCommand: npm run start:prod -w api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: NEXT_PUBLIC_API_URL
        value: "" # API doesn't need this, but good practice if shared
      - key: GEMINI_API_KEY
        sync: false

  # 2. Next.js Frontend
  - type: web
    name: fifa-web
    env: node
    plan: free
    # rootDir left blank to run from the root of the monorepo
    buildCommand: npm install && npm run build -w @visionary-fifa/web
    startCommand: npm run start -w @visionary-fifa/web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: fifa-api
          property: host
          # We prefix with https:// since Render hosts are secure
          format: "https://{}"
      - key: PORT
        value: 3000

databases:
  # 3. PostgreSQL Database
  - name: fifa-db
    databaseName: fifadb
    user: fifauser
    plan: free
