services:
  # 1. NestJS Backend API
  - type: web
    name: fifa-api
    env: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: NEXT_PUBLIC_API_URL
        value: "" # API doesn't need this, but good practice if shared

  # 2. Next.js Frontend
  - type: web
    name: fifa-web
    env: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: fifa-api
          property: host
          # We prefix with https:// since Render hosts are secure
          format: "https://{}"
      - key: PORT
        value: 3000

databases:
  # 3. PostgreSQL Database
  - name: fifa-db
    databaseName: fifadb
    user: fifauser
    plan: free
